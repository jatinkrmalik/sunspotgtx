<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4380D;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sun rays -->
  <circle cx="40" cy="40" r="18" fill="url(#sunGrad)" />
  <g stroke="#FF6B35" stroke-width="3" stroke-linecap="round">
    <line x1="40" y1="8" x2="40" y2="16"/>
    <line x1="40" y1="64" x2="40" y2="72"/>
    <line x1="8" y1="40" x2="16" y2="40"/>
    <line x1="64" y1="40" x2="72" y2="40"/>
    <line x1="17.4" y1="17.4" x2="23" y2="23"/>
    <line x1="57" y1="57" x2="62.6" y2="62.6"/>
    <line x1="62.6" y1="17.4" x2="57" y2="23"/>
    <line x1="23" y1="57" x2="17.4" y2="62.6"/>
  </g>
  <!-- Brand text -->
  <text x="85" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="700" fill="#2D2D2D" letter-spacing="1">SUNSPOT</text>
  <text x="85" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="400" fill="#666" letter-spacing="2">ELECTRICALS</text>
  <!-- Underline accent -->
  <rect x="85" y="63" width="50" height="2.5" rx="1" fill="url(#sunGrad)"/>
</svg>
